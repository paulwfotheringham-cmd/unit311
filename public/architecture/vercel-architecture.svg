  <text x="56" y="52" class="title">Unit311 Central - Vercel Deployment Architecture</text>
  <text x="56" y="80" class="subtitle">Generated from docs/VERCEL_ARCHITECTURE.md | version 20260715T235924Z | 2026-07-15T23:59:24.295Z</text>
  <text x="56" y="104" class="muted">Markdown is the specification. SVG/PNG under public/architecture/ are regenerated by code - do not hand-edit.</text>

  <!-- Vercel project -->
  <rect x="56" y="128" width="1668" height="92" rx="18" class="accent"/>
  <text x="80" y="160" class="label">Vercel project / production deployment</text>
  <text x="80" y="188" class="card-title">unit311central | Next.js (App Router)</text>
  <text x="80" y="208" class="mono">Vercel Edge Middleware + Node.js App Router | https://unit311central.com | Supabase Unit311 Central (kkxtvzxqmbacjatkiupq)</text>

  <!-- Domains -->
  <rect x="56" y="244" width="1668" height="190" rx="18" class="panel"/>
  <text x="80" y="276" class="label">Domains</text>
  
        <rect x="80" y="248" width="520" height="48" rx="10" class="chip"/>
        <text x="94" y="268" class="mono">unit311central.com</text>
        <text x="94" y="286" class="muted">Public marketing website · Production</text>
      

        <rect x="620" y="248" width="520" height="48" rx="10" class="chip"/>
        <text x="634" y="268" class="mono">www.unit311central.com</text>
        <text x="634" y="286" class="muted">Alias / redirect to apex · Production</text>
      

        <rect x="1160" y="248" width="520" height="48" rx="10" class="chip"/>
        <text x="1174" y="268" class="mono">unit311central.com/login</text>
        <text x="1174" y="286" class="muted">Shared login entry (apex path) · Production</text>
      

        <rect x="80" y="306" width="520" height="48" rx="10" class="chip"/>
        <text x="94" y="326" class="mono">internal.unit311central.com</text>
        <text x="94" y="344" class="muted">Unit311 Internal operations app · Production</text>
      

        <rect x="620" y="306" width="520" height="48" rx="10" class="chip"/>
        <text x="634" y="326" class="mono">*.unit311central.com</text>
        <text x="634" y="344" class="muted">Wildcard for customer workspace hosts · Required in Vercel + DNS</text>
      

        <rect x="1160" y="306" width="520" height="48" rx="10" class="chip"/>
        <text x="1174" y="326" class="mono">{slug}.unit311central.com</text>
        <text x="1174" y="344" class="muted">Future customer workspace host · Gateway ready; product UI later</text>
      

  <!-- Browser → Vercel -->
  <text x="56" y="460" class="label">Host detection → middleware → application surfaces</text>
  
    <rect x="56" y="470" width="540" height="220" rx="16" class="lane-public"/>
    <text x="74" y="504" class="label">Public website</text>
    <text x="74" y="542" class="body">unit311central.com</text>
<text x="74" y="564" class="body">Marketing pages + /login</text>
<text x="74" y="586" class="body">Session cookie parent domain</text>
<text x="74" y="608" class="body">Redirects legacy Internal paths</text>
  
  
    <rect x="620" y="470" width="540" height="220" rx="16" class="lane-internal"/>
    <text x="638" y="504" class="label">Internal application</text>
    <text x="638" y="542" class="body">internal.unit311central.com</text>
<text x="638" y="564" class="body">/ → rewrite /internaldashboard</text>
<text x="638" y="586" class="body">Ops UI (Unit311 Details, CRM, …)</text>
<text x="638" y="608" class="body">Login → apex /login</text>
  
  
    <rect x="1184" y="470" width="540" height="220" rx="16" class="lane-workspace"/>
    <text x="1202" y="504" class="label">Workspace routing</text>
    <text x="1202" y="542" class="body">*.unit311central.com</text>
<text x="1202" y="564" class="body">Rewrite → /ws/[slug]</text>
<text x="1202" y="586" class="body">Missing → unavailable placeholder</text>
<text x="1202" y="608" class="body">Present → onboarding placeholder</text>
  

  <line x1="596" y1="580" x2="616" y2="580" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="1160" y1="580" x2="1180" y2="580" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Middleware + customer flow -->
  <rect x="56" y="718" width="880" height="290" rx="18" class="panel"/>
  <text x="80" y="752" class="label">Middleware request flow</text>
  
        <text x="80" y="780" class="mono">Apex / www</text>
        <text x="420" y="780" class="body">Serve public marketing; redirect legacy Internal paths to internal.*</text>
      

        <text x="80" y="808" class="mono">Apex /login</text>
        <text x="420" y="808" class="body">Public login page</text>
      

        <text x="80" y="836" class="mono">Apex /internaldashboard*</text>
        <text x="420" y="836" class="body">Redirect → internal.unit311central.com</text>
      

        <text x="80" y="864" class="mono">internal.* /</text>
        <text x="420" y="864" class="body">Rewrite → /internaldashboard</text>
      

        <text x="80" y="892" class="mono">internal.* marketing paths</text>
        <text x="420" y="892" class="body">Redirect → apex</text>
      

        <text x="80" y="920" class="mono">internal.* /login</text>
        <text x="420" y="920" class="body">Redirect → apex /login</text>
      

        <text x="80" y="948" class="mono">{slug}.*</text>
        <text x="420" y="948" class="body">Rewrite → /ws/[slug] (workspace gateway)</text>
      

  <rect x="956" y="718" width="768" height="290" rx="18" class="panel"/>
  <text x="980" y="752" class="label">Customer workspace flow</text>
  <text x="980" y="780" class="body">1. DNS / SSL Wildcard *.unit311central.com resolves to Vercel with Valid SSL</text>
<text x="980" y="808" class="body">2. Browser request User opens https://{slug}.unit311central.com</text>
<text x="980" y="836" class="body">3. Host detection Middleware parses subdomain; reserved slugs rejected</text>
<text x="980" y="864" class="body">4. Rewrite Path rewritten to /ws/[slug]</text>
<text x="980" y="892" class="body">5. Lookup Gateway loads public.workspaces by slug</text>
<text x="980" y="920" class="body">6a. Missing Show unavailable placeholder + return to apex</text>
<text x="980" y="948" class="body">6b. Present Show onboarding placeholder with status (Preparing / Onboarding / </text>

  <!-- DNS / SSL + Future -->
  <rect x="56" y="1032" width="880" height="170" rx="18" class="panel"/>
  <text x="80" y="1066" class="label">DNS · SSL · wildcard domains</text>
  <text x="80" y="1088" class="body">Apex DNS: A / CNAME per Vercel Domains dashboard</text>
<text x="80" y="1110" class="body">internal DNS: CNAME → Vercel target</text>
<text x="80" y="1132" class="body">Wildcard DNS: *.unit311central.com CNAME → same Vercel target</text>
<text x="80" y="1154" class="body">SSL: Automatically issued by Vercel once DNS is Valid</text>
<text x="80" y="1176" class="body">Edge note: Until wildcard DNS + SSL are Valid, customer subdomains fail at the edge even if mid</text>

  <rect x="956" y="1032" width="768" height="170" rx="18" class="panel"/>
  <text x="980" y="1066" class="label">Future customer workspaces</text>
  <text x="980" y="1088" class="body">Hosting: Same Vercel project; no separate deployment per customer</text>
<text x="980" y="1110" class="body">Domain pattern: {workspace-slug}.unit311central.com via wildcard</text>
<text x="980" y="1132" class="body">Tenancy: Single Supabase project; workspace_id isolation</text>
<text x="980" y="1154" class="body">Provisioning: provision_workspace() then activate workspace host UI</text>
<text x="980" y="1176" class="body">Auth: Shared apex login + cookie on .unit311central.com</text>

  <!-- Footer -->
  <rect x="56" y="1224" width="1668" height="72" rx="14" class="panel"/>
  <text x="80" y="1254" class="label">Current status</text>
  <text x="80" y="1278" class="body">Vercel project unit311central: Production · Apex + login: Live · Internal host rewrite: Live · Middleware host detection: Live · Workspace host rewrite /ws/[slug]: Live ·</text>
<text x="80" y="1296" class="body">Placeholder pages: Live · Wildcard domain + DNS: Required for customer hosts at edge · Full customer workspace product UI: Future</text>
</svg>
