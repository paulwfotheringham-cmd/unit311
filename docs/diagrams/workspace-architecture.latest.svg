        <rect x="420" y="634" width="320" height="44" rx="10" class="foundation-card"/>
        <text x="436" y="662" class="foundation-label">workspace_audit_log</text>
      

  <!-- Flow arrows -->
  <line x1="576" y1="368" x2="612" y2="368" stroke="#7dd3fc" stroke-width="2" marker-end="url(#arrow)"/>
