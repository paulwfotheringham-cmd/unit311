  <!-- Future customer note -->
  <rect x="816" y="500" width="808" height="200" rx="18" class="panel"/>
  <text x="840" y="534" class="label">Multi-workspace model</text>
  <text x="840" y="566" class="card-title">One database · many workspaces</text>
  <text x="840" y="598" class="body">1) Unit311 Central Internal operations 2) Customer workspaces isolated by</text>
<text x="840" y="618" class="body">workspace_id. Phase 1 prepared the database only — application code is not</text>
<text x="840" y="638" class="body">workspace-aware yet. Inserts omitting workspace_id still default to Internal.</text>
  <text x="840" y="670" class="mono">Future: resolveActiveWorkspace(slug | organisation | session) → Internal stays slug=unit311</text>

  <!-- Workspace-aware -->
