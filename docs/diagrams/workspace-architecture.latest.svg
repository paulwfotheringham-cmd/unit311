  <text x="56" y="58" class="title">Unit311 Central — Workspace Architecture</text>
  <text x="56" y="88" class="subtitle">Generated visual of docs/WORKSPACE_ARCHITECTURE.md · version 20260715T222921Z · 2026-07-15T22:29:21.829Z</text>
  <text x="56" y="112" class="muted">Markdown remains the technical specification. This diagram is a linked visual representation.</text>

  <!-- Single project -->
  <rect x="56" y="140" width="1568" height="96" rx="18" class="accent-panel"/>
  <text x="80" y="172" class="label">Production Supabase (single project)</text>
  <text x="80" y="200" class="card-title">Unit311 Central</text>
  <text x="80" y="222" class="mono">project_id = kkxtvzxqmbacjatkiupq · Do not create another production database for tenancy</text>

  <!-- Registry -->
  <rect x="56" y="268" width="520" height="200" rx="18" class="panel"/>
  <text x="80" y="302" class="label">Registry</text>
  <text x="80" y="332" class="card-title">workspaces</text>
  <text x="80" y="358" class="body">id · name · slug · workspace_type · status</text>
  <text x="80" y="382" class="body">No workspace_id on this table (it is the registry).</text>
  <text x="80" y="414" class="mono">lookup preferred by slug, not hardcoded UUID</text>

  <!-- Internal workspace -->
  <rect x="616" y="268" width="520" height="200" rx="18" class="accent-panel"/>
  <text x="640" y="302" class="label">Internal workspace</text>
  <text x="640" y="332" class="card-title">Unit311 Central</text>
  <text x="640" y="358" class="mono">slug = unit311</text>
  <text x="640" y="382" class="body">type Internal · status Active</text>
  <text x="640" y="414" class="mono">id cd5c37a5-add4-4a8b-830c-6d26b775f62c</text>

  <!-- Provision -->
  <rect x="1176" y="268" width="448" height="200" rx="18" class="panel"/>
  <text x="1200" y="302" class="label">Customer provisioning</text>
  <text x="1200" y="332" class="card-title">provision_workspace()</text>
  <text x="1200" y="362" class="body">Transactional: workspace + settings +</text>
<text x="1200" y="380" class="body">enabled modules from unit311 + default</text>
<text x="1200" y="398" class="body">folders/categories + audit log. Returns</text>
<text x="1200" y="416" class="body">workspace_id. No</text>
<text x="1200" y="434" class="body">users/auth/clients/emails.</text>

  <!-- Foundation -->
  <rect x="56" y="500" width="720" height="200" rx="18" class="panel"/>
  <text x="80" y="534" class="label">Workspace foundation tables</text>
  <text x="80" y="560" class="body">1:1 / 1:N children of workspaces (database foundation; app not consuming yet)</text>
  
        <rect x="80" y="580" width="320" height="44" rx="10" class="foundation-card"/>
        <text x="96" y="608" class="foundation-label">workspace_settings</text>
      

        <rect x="420" y="580" width="320" height="44" rx="10" class="foundation-card"/>
